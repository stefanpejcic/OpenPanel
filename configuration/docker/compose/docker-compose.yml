services:
  # Database for OpenPanel users, plans, websites and domains
  openpanel_mysql:
    image: mariadb:10-focal
    container_name: openpanel_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: panel
      MYSQL_USER: panel
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
      - /root/initialize.sql:/docker-entrypoint-initdb.d/initialize.sql
      - /etc/localtime:/etc/localtime:ro
    oom_kill_disable: true
    networks:
      - openpanel_network
    deploy:
      resources:
        limits:
          cpus: "${MYSQL_CPUS:-1.0}"
          memory: "${MYSQL_RAM:-0.5G}"
          pids: 200

  # DEPRECATED Malware Scanner used from user panel
  clamav:
    image: clamav/clamav:${CLAMAV_VERSION}
    container_name: clamav
    volumes:
      - /home/:/home/
      - ./clamav-db:/var/lib/clamav
    restart: unless-stopped
    network_mode: ${CLAMAV_DB_AUTOUPDATE} # needed to update db daily
    environment:
      - CLAMD_STARTUP_DELAY=${CLAMD_STARTUP_DELAY}
    deploy:
      resources:
        limits:
          cpus: "${CLAMAV_CPUS:-1.0}"
          memory: "${CLAMAV_RAM:-1.0G}"
          pids: 200

  # to store user sessions and counters
  openpanel_redis:
    image: redis:latest
    container_name: openpanel_redis
    command: ["redis-server", "--unixsocket", "/tmp/redis/redis.sock", "--unixsocketperm", "770"]
    volumes:
      - ${REDIS_SOCKET}:/tmp/redis
    restart: always
    networks:
      - openpanel_network
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPUS:-0.5}"
          memory: "${REDIS_RAM:-0.5G}"
          pids: 100

  # OpenPanel UI
  openpanel:
    image: openpanel/openpanel-ui:${VERSION}
    container_name: openpanel
    depends_on:
      - openpanel_mysql
      - openpanel_redis
      #- clamav
    ports:
      - "${PORT}:2083/tcp"
    volumes:
      - /usr/local/opencli:/usr/local/opencli:ro                                         # opencli    
      - /var/log/openpanel/user/:/var/log/openpanel/user/                                # access and login logs 
      - /etc/bind:/etc/bind                                                              # dns
      - /home:/home                                                                      # files      
      - /usr/bin/docker:/usr/bin/docker:ro                                               # docker   
      - /root/.docker/:/root/.docker/:ro                                                 # docker contexts
      - /etc/openpanel/:/etc/openpanel/                                                  # settings      
      - /etc/openpanel/modules/:/modules/plugins/:ro                                     # plugins
      - /etc/openpanel/mysql/container_my.cnf:/etc/my.cnf:ro                             # mysql logins
      - /etc/openpanel/openpanel/translations/:/etc/openpanel/openpanel/translations     # locales
      - /root/openpanel_restart_needed:/root/openpanel_restart_needed                    # flag used on openadmin
      - /run/user/:/hostfs/run/user/:shared,rslave                                       # docker contexts
      - /var/run/docker.sock:/var/run/docker.sock:ro                                     # reload caddy on waf changes      
      - ${REDIS_SOCKET}:/tmp/redis/                                                      # redis cache
      - /var/log/caddy:/var/log/caddy                                                    # waf and domlogs      
      - /etc/localtime:/etc/localtime:ro                                                 # server timezone
      # CSF
      - /lib/modules:/lib/modules:ro      #TODO: test csf blocks
      - /proc:/host/proc:ro               #TODO: test csf blocks
      - /var/lib/csf/:/var/lib/csf/       #TODO: remove ratelimiting and this
    restart: always
    networks:
      - openpanel_network
    deploy:
      resources:
        limits:
          #cpus: "${OPENPANEL_CPUS:-1.0}"
          #memory: "${OPENPANEL_RAM:-1.0G}"
          pids: 1000

  caddy:
    image: ${CADDY_IMAGE}
    container_name: caddy
    cap_add:
      - NET_ADMIN
    working_dir: /etc/caddy/
    volumes:
      - /etc/openpanel/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/openpanel/caddy/:/etc/openpanel/caddy
      - /etc/openpanel/caddy/ssl:/data/caddy/certificates
      - /etc/openpanel/caddy/coraza_rules.conf:/etc/openpanel/caddy/coraza_rules.conf:ro
      - /var/log/caddy/:/var/log/caddy/
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    mem_limit: ${CADDY_RAM}
    cpus: ${CADDY_CPUS}
    oom_kill_disable: true
    network_mode: host

  # DNS
  bind9:
    container_name: openpanel_dns
    image: ubuntu/bind9:${BIND9_VERSION}
    environment:
      - BIND9_USER=root
      - TZ=${BIND_TIMEZONE}
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - /etc/bind/:/etc/bind/
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    oom_kill_disable: true
    networks:
      - openpanel_network
    deploy:
      resources:
        limits:
          cpus: "${BIND9_CPUS:-0.5}"
          memory: "${BIND9_RAM:-0.5G}"
          pids: 100

  # FTP
  openadmin_ftp:
    build:
      context: /etc/openpanel/ftp/    
    container_name: openadmin_ftp
    restart: always
    ports:
      - "21:21"
      - "${FTP_PORT_RANGE}:21000-21010"
    volumes:
      - /home/:/home/
      - /etc/openpanel/ftp/vsftpd.conf:/etc/vsftpd/vsftpd.conf:ro
      - /etc/openpanel/ftp/start_vsftpd.sh:/bin/start_vsftpd.sh:ro
      - /etc/openpanel/ftp/vsftpd.chroot_list:/etc/vsftpd.chroot_list
      - /etc/openpanel/ftp/all.users:/etc/openpanel/ftp/all.users
      - /etc/openpanel/ftp/users/:/etc/openpanel/ftp/users/
      - /etc/openpanel/caddy/ssl/:/etc/openpanel/caddy/ssl/:ro #ssl
      - /etc/localtime:/etc/localtime:ro
    networks:
      - openpanel_network
    deploy:
      resources:
        limits:
          cpus: "${FTP_CPUS:-0.5}"
          memory: "${FTP_RAM:-0.5G}"
          pids: 100

volumes:
  mysql:
    labels:
      description: "This volume holds the OpenPanel UI database."
      purpose: "configuration"

networks:
  openpanel_network:
    driver: bridge
    labels:
      description: "This network allows OpenPanel UI to communicate to system containers."
      purpose: "internal"
  
